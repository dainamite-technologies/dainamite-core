name: Claude PR Review

# Auto-review every PR against main:
#   - on PR open / synchronize â†’ posts a fresh analysis as the bot's first comment
#   - on demand via "@claude review" mention in any PR / issue comment
#
# The action checks out the repo, reads CLAUDE.md / AGENTS.md / .ai/skills/
# automatically, then iterates over the diff and posts findings. Auth via
# CLAUDE_CODE_OAUTH_TOKEN (subscription) â€” no per-token billing, no impact on
# the maintainer's interactive 5h Claude Code window.
#
# What still has to be set up manually before this workflow does anything
# useful:
#   1. Generate an OAuth token locally: `claude setup-token` (one-time, valid
#      ~12 months). Output is a single string starting with `oat_â€¦`.
#   2. Repo Settings â†’ Secrets and variables â†’ Actions â†’ New repository secret:
#      Name=CLAUDE_CODE_OAUTH_TOKEN  Value=<the token from step 1>
#   3. Optional but recommended: install the Anthropic Claude GitHub App so
#      the bot's PR comments come from a dedicated `claude[bot]` author and
#      respect repo CODEOWNERS (`/install-github-app` from local Claude Code).
#
# Rate limiting: the OAuth path uses an inference-only pool separate from the
# CLI's 5h interactive window, so this workflow won't starve local Claude Code
# usage. If account-tier rate limits are hit the action fails the run â€” re-run
# from the Actions tab, no charges accrue.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Skip docs-only churn â€” saves a review pass when nothing actionable
    # changed.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'manuals/**'
  issue_comment:
    types: [created]

# Cancel an in-flight review when a force-push lands a new commit on the same
# PR â€” re-runs against the latest sha rather than wasting minutes on the
# stale tree.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  # Required by anthropics/claude-code-action when the Anthropic Claude
  # GitHub App is installed on the repo â€” the action mints an OIDC token to
  # exchange for an App installation token (so comments come from claude[bot]
  # instead of github-actions[bot]). Without this the action fails with
  # "Could not fetch an OIDC token" even when CLAUDE_CODE_OAUTH_TOKEN is set.
  id-token: write

jobs:
  review:
    name: Claude review
    # Only run the on-comment branch when someone actually mentions the bot
    # â€” without this guard every comment on every issue/PR would invoke it.
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # The action needs the full PR diff vs base; depth 0 is the safe
          # default, the action will pick the right comparison.
          fetch-depth: 0

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Sonnet 4.6 pinned for reproducibility. max-turns sized for
          # read-CLAUDE.md â†’ AGENTS.md â†’ SKILL.md â†’ sub-skill â†’ diff â†’
          # inline-comments â†’ write-summary â†’ post-via-gh. The flag is
          # `--allowedTools` (camelCase) â€” kebab-case is silently ignored.
          #
          # Two-channel review:
          #   - Inline comments via mcp__github_inline_comment__createâ€¦
          #     for specific file:line issues. The action buffers them
          #     and flushes via post-buffered-inline-comments.ts at end.
          #   - Top-level summary via gh pr comment from the same bash
          #     context, so it's authored by claude[bot] (App installation
          #     token, minted by the action via OIDC).
          # If gh pr comment from inside the action is blocked, the
          # standalone "Post review comment" step at the end falls back
          # to GITHUB_TOKEN (comment would appear as github-actions[bot]).
          # Both paths publish the same content.
          claude_args: |
            --max-turns 30
            --model claude-sonnet-4-6
            --allowedTools "Read,Glob,Grep,Write,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(cat:*),mcp__github_inline_comment__create_inline_comment"
          prompt: |
            You are reviewing a pull request on the dainamite-core repository
            (a standalone Open Mercato L3 application that hosts the in-tree
            CPQ module destined for extraction to `@dainamite/cpq`).

            Read these BEFORE forming opinions â€” they are the team's
            non-negotiable contract:

              1. CLAUDE.md â€” project routing, CPQ â†’ Task â†’ Context Map
              2. AGENTS.md â€” generic project conventions
              3. .ai/skills/cpq/SKILL.md â€” engineering bar, hard rules,
                 Definition of Done
              4. Any sub-skill under .ai/skills/cpq/<area>/SKILL.md that
                 matches the touched code (pricing / quoting / products /
                 inventory / orders / arc / packaging)

            And â€” equally important â€” the **Open Mercato framework
            conventions**. CPQ runs on top of Open Mercato; ~80% of what
            looks like a CPQ design choice is actually a framework
            convention. Patterns guessed from generic Next.js / TypeScript /
            MikroORM knowledge will violate documented framework
            invariants. The framework's authoritative docs ship inside
            node_modules â€” load them when the PR touches the relevant
            surface:

              - node_modules/@open-mercato/core/AGENTS.md â€” master
                extensibility contract: modules, DI (Awilix), events,
                custom fields, ACL, setup, response enrichers, API
                interceptors, widget injection, component replacement,
                RBAC wildcard matcher, withAtomicFlush, command pattern
              - node_modules/@open-mercato/core/src/modules/sales/AGENTS.md
                â€” sales (quote â†’ order â†’ invoice flow); CPQ piggybacks on
                sales for headers
              - node_modules/@open-mercato/core/src/modules/<module>/AGENTS.md
                â€” customers / catalog / currencies / integrations /
                data_sync / workflows / customer_accounts / auth (RBAC) /
                directory
              - node_modules/@open-mercato/events/AGENTS.md â€” event bus,
                createModuleEvents, subscribers (persistent vs ephemeral),
                SSE bridge
              - node_modules/@open-mercato/shared/AGENTS.md â€” withAtomicFlush,
                response enrichers, query engine extensibility, feature-
                match helpers (wildcard-aware)
              - node_modules/@open-mercato/ui/AGENTS.md â€” CrudForm,
                DataTable, primitives, sidebar icons, FormHeader/FormFooter
              - node_modules/@open-mercato/cli/AGENTS.md â€” generator
                system, auto-discovery file patterns, module-scoped
                migrations
              - node_modules/@open-mercato/queue/AGENTS.md â€” worker
                contract, idempotency, local/async strategies
              - node_modules/@open-mercato/<package>/AGENTS.md â€” for any
                other framework package the PR touches

            Where the framework's docs and our project conventions
            diverge, our conventions win for repo-local code (e.g. CPQ
            uses `api/<resource>/route.ts`; new sibling modules under
            `src/modules/` follow framework's `api/<method>/<path>.ts`).
            Surface the divergence rather than picking sides silently.

            Your output is a single PR review comment with these sections:

            ### What this PR does (1â€“3 sentences)
            Plain-English summary of intent + scope. Mention the JIRA ticket
            (XD-NNN) if obvious from branch name / commit messages.

            ### Conventions check
            Tick off, per item, whether the PR honours each non-negotiable.
            Be direct â€” say "MISSING" / "VIOLATED" with file:line evidence.

            **Open Mercato framework invariants** (apply everywhere):
              - **Auto-discovery layout**: filenames + locations *are* the
                contract â€” `events.ts`, `acl.ts`, `setup.ts`, `ce.ts`,
                `data/entities.ts`, `data/validators.ts`, `data/enrichers.ts`,
                `data/extensions.ts`, `subscribers/*.ts`, `workers/*.ts`,
                `widgets/injection-table.ts`, `widgets/components.ts`,
                `translations.ts`, `notifications.ts`, `search.ts`. Anything
                relocated to a non-canonical path will be silently skipped by
                the bootstrap.
              - **Run `yarn generate` after structural changes**: editing
                `src/modules.ts`, `events.ts`, `acl.ts`, `data/enrichers.ts`,
                widget files, `api/`, `subscribers/`, `workers/` â€” without
                regen, `.mercato/generated/*` goes stale. Never edit
                `.mercato/generated/*` by hand.
              - **Run `yarn mercato db generate` after entity changes**:
                migration must be a generated file, never hand-written.
              - **No imports from `node_modules/@open-mercato/*` outside
                of allowed entry points** â€” never edit `node_modules`; eject
                the module via `yarn mercato eject <module>` if it must be
                customised beyond extension primitives.
              - **DI via Awilix**: services resolved from the container,
                not `new`-ed directly; closure-resolution pattern preferred
                for new services.
              - **Commands for writes** (sales / catalog mutations): writes
                go through commands (`execute` + `undo`); side-effect
                emitters live OUTSIDE `withAtomicFlush`.
              - **Cross-module = framework primitive, not direct import**:
                Need to react to a write? Subscriber + event. Need to
                extend another module's API response? Response enricher.
                Need a UI add-on? Widget injection / component replacement.
                Direct import of another module's services / entities is a
                code smell; ORM relations across module boundaries are a
                hard fail.
              - **Events follow `createModuleEvents`** with id pattern
                `module.entity.action` (singular entity, past tense, e.g.
                `sales.order.created`). Persistent vs ephemeral chosen
                deliberately per the events guide.
              - **Worker contract**: `metadata = { queue, id?, concurrency? }`
                exported from each `workers/*.ts`; idempotent under retry.
              - **No `any` types**: Zod schemas everywhere user input
                lands; `z.infer` for derived TS types; runtime narrows for
                anything still unknown.
              - **Encrypted queries via `findWithDecryption`** when the
                entity has encrypted columns â€” never raw `em.find` for
                those.

            **CPQ-specific (on top of the framework rules)**:
              - **API-first**: every new route exports `openApi`. New write
                routes call `validateCrudMutationGuard` /
                `runCrudMutationGuardAfterSuccess` (or use
                `createCrudOpenApiFactory`).
              - **CPQ routing convention**: `api/<resource>/route.ts`
                (Next.js style). New sibling modules outside CPQ use
                framework's `api/<method>/<path>.ts`.
              - **No cross-module ORM**: no `@ManyToOne` / `@OneToMany` from
                cpq to non-cpq entities. `customer_id` / `product_id` /
                `quote_id` are FK strings.
              - **Tenant scoping**: every new entity has `organizationId` +
                `tenantId` indexed, standard `created_at` / `updated_at` /
                `deleted_at` / `is_active` columns, UUID PK.
              - **Atomic flush**: `withAtomicFlush` wraps any "mutate scalars
                then query on same EM" sequence.
              - **Status enums**: changes to status sets land in
                `services/types.ts` (`CPQ_STATUSES`,
                `INVENTORY_SUBSCRIPTION_STATUSES`, â€¦) â€” never inline.
              - **ACL**: features added to `acl.ts` AND wired in
                `setup.ts` `defaultRoleFeatures`. Use `hasFeature` /
                `hasAllFeatures` for runtime checks (not `.includes()` â€”
                wildcard grants like `cpq.*` will silently fail).
              - **i18n**: user-facing strings via `useT()` /
                `resolveTranslations()` â€” no hardcoded labels.
              - **Sidebar icons**: `lucide-react` only â€” never inline SVG
                via `React.createElement`.
              - **Detail page accompanies list page**: any new entity
                exposed in admin UI has both list and `[id]` pages, with
                loading / 404 / error states distinct, `FormHeader` in
                `detail` mode, injection slots for cross-module add-ons.
              - **DataTable**: pagination wired (`page`, `pageSize`,
                `totalCount`, `onPageChange`); `pageSize` â‰¤ 100.
              - **Manual updated**: any operator-facing behaviour change
                is reflected in `manuals/*.md`.
              - **MIGRATION.md updated**: any breaking change to a CPQ
                public contract (route signatures, validator shapes,
                emitted event payloads, public service methods) has an
                entry in `packages/cpq/MIGRATION.md`.
              - **CPQ never imports from `src/modules/<other>/`** â€”
                customer-specific code goes to `src/modules/@app/<feature>/`,
                NOT inside `src/modules/cpq/`.
              - **Tests obligatory**: services / validators / state
                machines / seeds touched have unit tests; UI flows
                touched have a Playwright integration spec under
                `__integration__/TC-CPQ-*.spec.ts`. Use
                `jest --config jest.config.cjs` (already wired via
                `yarn test`) â€” see `.ai/skills/unit-tests/SKILL.md`.

            ### Inconsistencies & suggestions
            Specific, actionable items with file:line refs. Order by impact.
            Skip nits â€” flag them only if they cluster (e.g. multiple
            hardcoded strings).

            ### Test coverage gaps
            Mark scenarios from the relevant manual or spec that the PR
            should have covered but didn't (matches the project's "scenarios
            in tests" rule for ARC and similar feature areas).

            ### Risk callouts
            Anything that could regress neighbouring areas â€” e.g. shared
            helpers used elsewhere, generated `.mercato/` consequences,
            seed/migration ordering. Brief.

            Tone: senior reviewer, terse, no fluff. Don't repeat the diff
            back at the user. Don't compliment things that are merely
            correct â€” focus on what's worth a human's attention.

            If the PR is docs-only or trivial, say so in 1 line and stop.

            ## Output format â€” IMPORTANT

            Use TWO complementary channels for findings:

            **A. Inline comments â€” for specific file:line issues.**
            For each concrete problem anchored to a precise location
            (a violated invariant, a buggy line, a missing piece in a
            specific function), call:

            ```
            mcp__github_inline_comment__create_inline_comment
              path: "<repo-relative path>"
              line: <number, end-of-range for multi-line>
              body: "<short, actionable message â€” 1-3 sentences max>"
            ```

            Use these when the finding pins to ONE place. Don't use
            inline for general observations or things spanning many
            files. Don't repeat the diff â€” say what's wrong and how to
            fix it. Aim for 0â€“8 inline comments on a typical PR; if you
            find more, you're probably nitpicking.

            **B. Top-level summary comment â€” for the synthesis.**
            Use the `Write` tool to save the markdown review to
            **`/tmp/claude-review.md`**, then post via `Bash`:

            ```bash
            gh pr comment <PR_NUMBER> --body-file /tmp/claude-review.md
            ```

            (PR number from `$GITHUB_REF` or `gh pr view`.) The
            top-level summary covers the 5 sections (What this PR does
            / Conventions check / Inconsistencies & suggestions / Test
            coverage gaps / Risk callouts). Inside "Inconsistencies",
            cross-reference inline comments by saying "(see inline)"
            instead of repeating the file:line detail.

            Posting via `gh pr comment` from inside the action uses the
            Claude GitHub App installation token, so the comment is
            authored by `claude[bot]` with branded avatar.

            If the PR is trivial / docs-only, skip inline entirely and
            write a 1-line file ("_Trivial change â€” no review needed._")
            posted as a top-level comment. Do NOT spam inline comments
            on a trivial PR.

      - name: Fallback â€” post review comment if claude[bot] didn't
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          # Preferred path: Claude already posted via gh pr comment from
          # inside the action (using the Claude GitHub App's installation
          # token, so the comment appears as claude[bot]). This step is
          # the safety net â€” if the action couldn't post (permission edge
          # case, network blip), fall back to publishing the same review
          # markdown via GITHUB_TOKEN. The fallback comment appears as
          # `github-actions[bot]` instead, but the content is identical.
          if [ ! -s /tmp/claude-review.md ]; then
            echo "::warning::No review file produced â€” Claude run may have failed silently."
            exit 0
          fi

          # Skip fallback if a claude[bot] comment is already on the PR
          # for this run (Claude posted successfully). We match by author
          # and a marker present in every review (the "What this PR does"
          # heading or â€” for trivial PRs â€” the "Trivial change" line).
          existing_count=$(gh pr view "$PR_NUMBER" --json comments \
            --jq '[.comments[] | select(.author.login == "claude")] | length' \
            2>/dev/null || echo 0)
          if [ "$existing_count" != "0" ]; then
            echo "claude[bot] already posted ($existing_count comment(s)) â€” skipping fallback."
            exit 0
          fi

          echo "claude[bot] did not post â€” falling back to github-actions[bot]."
          gh pr comment "$PR_NUMBER" --body-file /tmp/claude-review.md
