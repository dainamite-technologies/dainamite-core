name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# On PRs, cancel any in-flight runs for the same ref so force-pushes don't
# burn minutes. On main pushes, never cancel — every commit gets verified.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Install dependencies
        # --no-immutable: Yarn 4 forces immutable installs in CI by default
        # (when CI=true env is detected). We explicitly opt out so transient
        # registry metadata diffs don't fail the build.
        run: yarn install --no-immutable

      - name: Generate auto-discovered files
        run: yarn generate

      - name: Typecheck
        run: yarn typecheck

      - name: Run unit tests
        run: yarn test --coverage --ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg17-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: open-mercato
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/open-mercato
      REDIS_URL: redis://localhost:6379
      BASE_URL: http://localhost:3000
      NODE_ENV: development
      # Skip telemetry / interactive prompts in non-TTY runner
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Install dependencies
        # --no-immutable: Yarn 4 forces immutable installs in CI by default
        # (when CI=true env is detected). We explicitly opt out so transient
        # registry metadata diffs don't fail the build.
        run: yarn install --no-immutable

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium + system deps
        run: npx playwright install --with-deps chromium

      - name: Generate auto-discovered files
        run: yarn generate

      - name: Initialize app (migrate + seed accounts)
        run: yarn initialize

      - name: Start dev server in background
        run: |
          nohup yarn dev > dev-server.log 2>&1 &
          echo "DEV_PID=$!" >> "$GITHUB_ENV"
          echo "Dev server PID: $!"

      - name: Wait for dev server (max 180s)
        run: |
          timeout 180 bash -c 'until curl -sf http://localhost:3000/ > /dev/null; do
            echo "Waiting for dev server on :3000..."
            sleep 3
          done'
          echo "Dev server is up."

      - name: Run integration tests
        run: yarn test:integration

      - name: Stop dev server
        if: always()
        run: |
          if [ -n "$DEV_PID" ]; then kill "$DEV_PID" || true; fi

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_id }}
          path: |
            .ai/qa/test-results/
            dev-server.log
          retention-days: 7
          if-no-files-found: ignore
