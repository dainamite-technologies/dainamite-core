name: Release @dainamite/* packages

on:
  push:
    branches: [main]

# Cancel any in-flight release run for the same ref.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# `contents: write` for the changesets action to push the "Version Packages" branch.
# `pull-requests: write` for opening / updating the version PR.
# `id-token: write` for npm provenance (recommended for public packages).
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed for changesets to compute version bumps from
          # the changelog of pending changesets.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # Auth handled at publish time via .npmrc + NPM_TOKEN. The checked-in
          # .npmrc points npm.js auth at the NPM_TOKEN env var; we deliberately
          # don't use setup-node's registry-url so we keep a single source of truth.

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build all workspace packages
        # Each @dainamite/* package gets built before publish so dist/ exists.
        # If we add more packages later, switch to `yarn workspaces foreach -A run build`.
        run: yarn workspace @dainamite/cpq build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # When PR with version bumps is merged → this command publishes.
          # When changesets exist but PR isn't merged → updates the PR.
          publish: yarn changeset publish
        env:
          # GitHub auth — use RELEASE_TOKEN (PAT) if available, fall back to
          # GITHUB_TOKEN. Why PAT: PRs created with the default GITHUB_TOKEN do
          # NOT trigger other workflows (anti-recursion safety). A PAT-authored
          # PR is treated as user-authored and triggers CI normally.
          # PAT setup: Settings → Developer settings → Personal access tokens →
          # Tokens (classic) → Generate new with `repo` scope. Add as repo secret
          # named RELEASE_TOKEN.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          # npm.js auth for `yarn changeset publish`. Get the token at
          # https://www.npmjs.com/settings/<username>/tokens (type: Automation,
          # scope: read+write, NOT a granular access token — those don't work
          # well with org-scoped publishes yet). Add as repo secret named
          # NPM_TOKEN.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
