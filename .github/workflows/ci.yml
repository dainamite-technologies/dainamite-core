name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly health check — Monday 06:00 UTC. Catches flakes / dep-bump regressions
    # that don't get triggered by direct activity. Runs against the default branch (main).
    - cron: '0 6 * * 1'
  # Manual trigger — exposes a "Run workflow" button in the Actions tab so you
  # can re-run the suite ad-hoc (e.g. to verify after env changes / before merge).
  workflow_dispatch:

# On PRs, cancel any in-flight runs for the same ref so force-pushes don't
# burn minutes. On main pushes / scheduled runs, never cancel.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# pull-requests:write needed to post the aggregate test summary as a PR comment.
permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Install dependencies
        # --no-immutable: Yarn 4 forces immutable installs in CI by default
        # (when CI=true env is detected). We explicitly opt out so transient
        # registry metadata diffs don't fail the build.
        run: yarn install --no-immutable

      - name: Generate auto-discovered files
        run: yarn generate

      - name: Typecheck
        # Bump heap — tsc OOMs at default 2GB on this codebase
        run: yarn typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Run unit tests
        # Emit JSON report next to coverage so the summary step can parse counts.
        run: yarn test --coverage --ci --json --outputFile=jest-results.json

      - name: Render unit-tests job summary
        if: always()
        continue-on-error: true
        run: node .github/scripts/render-jest-summary.mjs

      - name: Upload jest results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: jest-results.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg17-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: open-mercato
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/open-mercato
      REDIS_URL: redis://localhost:6379
      BASE_URL: http://localhost:3000
      NODE_ENV: production
      # Skip telemetry / interactive prompts in non-TTY runner
      NEXT_TELEMETRY_DISABLED: "1"
      # GH Actions standard runner has 7 GB RAM. next build needs heap > default 2 GB.
      NODE_OPTIONS: --max-old-space-size=6144
      # Production-mode auth requires multiple secrets:
      # - AUTH_TOKEN_SECRET: token hashing
      # - JWT_SECRET: audience-derived JWT signing
      # - NEXTAUTH_SECRET / AUTH_SECRET: aliases used by some helpers
      # Throwaway values — DB is ephemeral per-run, no real secrets ever land here.
      AUTH_TOKEN_SECRET: ci-throwaway-token-secret-not-for-prod-${{ github.run_id }}
      JWT_SECRET: ci-throwaway-jwt-secret-not-for-prod-${{ github.run_id }}
      AUTH_SECRET: ci-throwaway-auth-secret-not-for-prod-${{ github.run_id }}
      NEXTAUTH_SECRET: ci-throwaway-nextauth-secret-not-for-prod-${{ github.run_id }}
      # Disable auth rate limiter — Playwright in CI runs many logins back-to-back
      # and would otherwise hit "Too many requests".
      OM_TEST_MODE: "1"
      OM_TEST_AUTH_RATE_LIMIT_MODE: opt-in

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Install dependencies
        # --no-immutable: Yarn 4 forces immutable installs in CI by default
        # (when CI=true env is detected). We explicitly opt out so transient
        # registry metadata diffs don't fail the build.
        run: yarn install --no-immutable

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium + system deps
        run: npx playwright install --with-deps chromium

      - name: Generate auto-discovered files
        run: yarn generate

      - name: Initialize app (migrate + seed accounts)
        run: yarn initialize

      - name: Build (production)
        # Production build is dramatically lighter at runtime than `yarn dev`
        # — dev mode peaked at 6.1 GB RSS while precompiling routes on the
        # 7 GB CI runner. `next start` against a built app is ~500 MB.
        run: yarn build

      - name: Start production server in background
        run: |
          nohup yarn start > dev-server.log 2>&1 &
          echo "DEV_PID=$!" >> "$GITHUB_ENV"
          echo "Server PID: $!"

      - name: Wait for server (max 180s)
        # Accept any HTTP response (incl. 5xx) — server up == port answers.
        run: |
          timeout 180 bash -c 'until curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ | grep -qE "^[0-9]"; do
            echo "Waiting for server on :3000..."
            sleep 3
          done'
          echo "Server is up."

      - name: Run integration tests
        run: yarn test:integration

      - name: Render integration-tests job summary
        if: always()
        continue-on-error: true
        run: node .github/scripts/render-playwright-summary.mjs

      - name: Upload playwright results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-json
          path: .ai/qa/test-results/results.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Stop dev server
        if: always()
        run: |
          if [ -n "$DEV_PID" ]; then kill "$DEV_PID" || true; fi

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_id }}
          path: |
            .ai/qa/test-results/
            dev-server.log
          retention-days: 7
          if-no-files-found: ignore

  pr-summary:
    name: PR test summary
    if: github.event_name == 'pull_request' && always()
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download jest results
        uses: actions/download-artifact@v4
        with:
          name: jest-results
          path: jest-results
        continue-on-error: true

      - name: Download playwright results
        uses: actions/download-artifact@v4
        with:
          name: playwright-results-json
          path: playwright-results
        continue-on-error: true

      - name: Build and post summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function readJson(p) {
              try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return null; }
            }

            // ── Unit (Jest) ──────────────────────────────────────────
            const jest = readJson('jest-results/jest-results.json');
            let unitLine = '⚠️ Unit tests: report missing';
            if (jest) {
              const total = jest.numTotalTests, pass = jest.numPassedTests, fail = jest.numFailedTests, skip = jest.numPendingTests;
              const icon = fail === 0 ? '✅' : '❌';
              unitLine = `${icon} **Unit tests:** ${pass}/${total} passed` +
                (fail ? `, ${fail} failed` : '') + (skip ? `, ${skip} skipped` : '');
            }

            // ── Integration (Playwright) ─────────────────────────────
            const pw = readJson('playwright-results/results.json');
            let integLine = '⚠️ Integration tests: report missing';
            if (pw) {
              let pass = 0, fail = 0, skip = 0;
              const walk = (s) => {
                for (const sub of s.suites || []) walk(sub);
                for (const spec of s.specs || []) {
                  for (const t of spec.tests || []) {
                    const final = (t.results || []).slice(-1)[0];
                    if (!final) continue;
                    if (final.status === 'passed') pass++;
                    else if (final.status === 'skipped' || final.status === 'interrupted') skip++;
                    else fail++;
                  }
                }
              };
              for (const top of pw.suites || []) walk(top);
              const total = pass + fail + skip;
              const icon = fail === 0 ? '✅' : '❌';
              integLine = `${icon} **Integration tests:** ${pass}/${total} passed` +
                (fail ? `, ${fail} failed` : '') + (skip ? `, ${skip} skipped` : '');
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `<!-- ci-summary -->
            ## CI test summary

            ${unitLine}
            ${integLine}

            [Full run details →](${runUrl})

            _Auto-updated on each push. Drill into a job for individual test names + trace artifacts._`;

            // Find existing comment by marker, update if present, else create.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes('<!-- ci-summary -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing CI summary comment #${existing.id}`);
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info(`Created CI summary comment #${created.id}`);
            }
